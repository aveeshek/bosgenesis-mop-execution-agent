apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}-config
  labels:
    {{- include "bosgenesis-mop-execution-agent.labels" . | nindent 4 }}
data:
  SERVICE_NAME: {{ .Values.config.serviceName | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  ARTIFACT_ROOT_PATH: {{ .Values.config.artifactRootPath | quote }}
  POLICY_PROFILE: {{ .Values.config.policyProfile | quote }}
  TARGET_NAMESPACE_ONLY: {{ .Values.config.targetNamespaceOnly | quote }}
  DRY_RUN_BEFORE_MUTATION: {{ .Values.config.dryRunBeforeMutation | quote }}
  HUMAN_APPROVAL_BEFORE_MUTATION: {{ .Values.config.humanApprovalBeforeMutation | quote }}
  NO_SECRET_VALUES: {{ .Values.config.noSecretValues | quote }}
  NO_PRODUCTION_DATA: {{ .Values.config.noProductionData | quote }}
  MAX_JOB_DURATION_SECONDS: {{ .Values.config.maxJobDurationSeconds | quote }}
  DEFAULT_STEP_TIMEOUT_SECONDS: {{ .Values.config.defaultStepTimeoutSeconds | quote }}
  DEFAULT_WAIT_POLL_INTERVAL_SECONDS: {{ .Values.config.defaultWaitPollIntervalSeconds | quote }}
  MAX_PARALLEL_JOBS_PER_NAMESPACE: {{ .Values.config.maxParallelJobsPerNamespace | quote }}
  NAMESPACE_LOCK_LEASE_SECONDS: {{ .Values.config.namespaceLockLeaseSeconds | quote }}
  WORKER_CONCURRENCY: {{ .Values.config.workerConcurrency | quote }}
  WORKER_HEARTBEAT_INTERVAL_SECONDS: {{ .Values.config.workerHeartbeatIntervalSeconds | quote }}
  RECONCILER_INTERVAL_SECONDS: {{ .Values.config.reconcilerIntervalSeconds | quote }}
  OTEL_ENABLED: {{ .Values.config.enableOtel | quote }}
  SIGNOZ_ENDPOINT: {{ .Values.config.signozEndpoint | quote }}
  LANGFUSE_ENABLED: {{ .Values.config.langfuseEnabled | quote }}
  K8S_INSPECTOR_MCP_ENDPOINT: {{ .Values.config.k8sInspectorMcpEndpoint | quote }}
  HELM_MANAGER_MCP_ENDPOINT: {{ .Values.config.helmManagerMcpEndpoint | quote }}
  K8S_DATA_INGESTION_MCP_ENDPOINT: {{ .Values.config.dataIngestionMcpEndpoint | quote }}
  MOP_CREATION_AGENT_ENDPOINT: {{ .Values.config.mopCreationAgentEndpoint | quote }}
  RELEASE_NOTE_AGENT_ENDPOINT: {{ .Values.config.releaseNoteAgentEndpoint | quote }}

{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}
  labels:
    {{- include "bosgenesis-mop-execution-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "bosgenesis-mop-execution-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
  egress:
    - to:
        - namespaceSelector: {}
{{- end }}

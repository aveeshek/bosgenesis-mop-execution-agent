{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}-migrations
  labels:
    {{- include "bosgenesis-mop-execution-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "bosgenesis-mop-execution-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "bosgenesis-mop-execution-agent.serviceAccountName" . }}
      containers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}-config
          env:
            {{- include "bosgenesis-mop-execution-agent.secretEnv" . | nindent 12 }}
{{- end }}

{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}
  labels:
    {{- include "bosgenesis-mop-execution-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services", "pods", "pods/log", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  {{- if .Values.rbac.allowDelete }}
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources: ["configmaps", "services", "pods", "persistentvolumeclaims", "deployments", "statefulsets", "daemonsets", "jobs", "cronjobs", "ingresses"]
    verbs: ["delete"]
  {{- end }}
{{- end }}

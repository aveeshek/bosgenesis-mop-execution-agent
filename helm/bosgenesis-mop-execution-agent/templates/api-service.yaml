{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}
  labels:
    {{- include "bosgenesis-mop-execution-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "bosgenesis-mop-execution-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}

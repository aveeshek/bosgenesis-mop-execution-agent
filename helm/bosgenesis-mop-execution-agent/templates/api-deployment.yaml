{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}
  labels:
    {{- include "bosgenesis-mop-execution-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bosgenesis-mop-execution-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "bosgenesis-mop-execution-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bosgenesis-mop-execution-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - bosgenesis_mop_execution_agent.entrypoints.api_main
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "bosgenesis-mop-execution-agent.fullname" . }}-config
          env:
            - name: API_PORT
              value: {{ .Values.api.port | quote }}
            {{- include "bosgenesis-mop-execution-agent.secretEnv" . | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.artifactBundles.existingClaim }}
            - name: artifact-bundles
              mountPath: {{ .Values.artifactBundles.mountPath | quote }}
              readOnly: {{ .Values.artifactBundles.readOnly }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bosgenesis-mop-execution-agent.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.artifactBundles.existingClaim }}
        - name: artifact-bundles
          persistentVolumeClaim:
            claimName: {{ .Values.artifactBundles.existingClaim }}
            readOnly: {{ .Values.artifactBundles.readOnly }}
        {{- end }}
{{- end }}

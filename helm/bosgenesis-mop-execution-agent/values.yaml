replicaCount: 1

image:
  repository: ghcr.io/aveeshek/bosgenesis-mop-execution-agent
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

config:
  serviceName: bosgenesis-mop-execution-agent
  environment: production
  logLevel: INFO
  logFormat: json
  artifactRootPath: /data/mop-execution
  policyProfile: namespace-only-v1
  targetNamespaceOnly: "true"
  dryRunBeforeMutation: "true"
  humanApprovalBeforeMutation: "true"
  noSecretValues: "true"
  noProductionData: "true"
  maxJobDurationSeconds: "14400"
  defaultStepTimeoutSeconds: "600"
  defaultWaitPollIntervalSeconds: "15"
  maxParallelJobsPerNamespace: "1"
  namespaceLockLeaseSeconds: "300"
  workerConcurrency: "1"
  workerHeartbeatIntervalSeconds: "60"
  reconcilerIntervalSeconds: "60"
  enableOtel: "false"
  signozEndpoint: "http://signoz-otel-collector.signoz.svc.cluster.local:4317"
  langfuseEnabled: "false"
  k8sInspectorMcpEndpoint: "http://bosgenesis-k8s-inspector-mcp.bosgenesis.svc.cluster.local:8080"
  helmManagerMcpEndpoint: "http://bosgenesis-helm-manager-mcp.bosgenesis.svc.cluster.local:8080"
  dataIngestionMcpEndpoint: "http://bosgenesis-k8s-data-ingestion-agent.bosgenesis.svc.cluster.local:8080"
  mopCreationAgentEndpoint: "http://bosgenesis-mop-creation-agent.bosgenesis.svc.cluster.local:8080"
  releaseNoteAgentEndpoint: "http://bosgenesis-release-note-agent-api.bosgenesis.svc.cluster.local:8080"

external:
  databaseUrlSecret:
    name: ""
    key: DATABASE_URL
  redisUrlSecret:
    name: ""
    key: REDIS_URL
  clickhouseDsnSecret:
    name: ""
    key: CLICKHOUSE_DSN
  qdrantUrlSecret:
    name: ""
    key: QDRANT_URL
  langfusePublicKeySecret:
    name: ""
    key: LANGFUSE_PUBLIC_KEY
  langfuseSecretKeySecret:
    name: ""
    key: LANGFUSE_SECRET_KEY

api:
  enabled: true
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

reconciler:
  enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

migrations:
  enabled: false
  command:
    - /bin/sh
    - -c
    - "echo 'Run migrations/postgres/0001_phase2_core.sql with the platform migration runner.'"

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  storageClassName: ""

rbac:
  create: true
  targetNamespace: ""
  allowNamespaceCreate: false
  allowDelete: false

networkPolicy:
  enabled: false

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: mop-execution-agent.bosgenesis.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}

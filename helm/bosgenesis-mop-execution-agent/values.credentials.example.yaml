# Non-secret defaults mirror bosgenesis-mop-creation-agent PostgreSQL wiring.
# Copy this file outside git or pass these values from your secret manager.

config:
  memoryEnabled: "true"
  memoryPostgresEnabled: "true"
  postgresEnabled: "true"
  postgresSchema: "mop_execution"

external:
  postgresDsnSecret:
    name: bosgenesis-mop-execution-agent-secret
    key: POSTGRES_DSN
  # Backward-compatible alias for platforms that already provide DATABASE_URL.
  databaseUrlSecret:
    name: bosgenesis-mop-execution-agent-secret
    key: DATABASE_URL
  k8sInspectorApiKeySecret:
    name: bosgenesis-k8s-inspector-mcp-secret
    key: BOSGENESIS_API_KEY
  helmManagerApiKeySecret:
    name: bosgenesis-helm-manager-mcp-secret
    key: BOSGENESIS_API_KEY

# Example Kubernetes Secret data:
# POSTGRES_DSN=postgresql://bosgenesis:CHANGE_ME@postgresql.bosgenesis.svc.cluster.local:5432/bosgenesis
# DATABASE_URL=postgresql://bosgenesis:CHANGE_ME@postgresql.bosgenesis.svc.cluster.local:5432/bosgenesis
# K8S_INSPECTOR_API_KEY and HELM_MANAGER_API_KEY are read from the referenced companion
# service secrets above and are used only for governed dry-run/mutation API calls.
